<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>camargo7 | siteㅤparaㅤprojetos/title>
    <style>
        :root {
            --bg-principal: #0d1117;     
            --bg-cards: #161b22;         
            --bg-inputs: #21262d;        
            --borda-suave: #30363d;     
            --texto-claro: #f0f6fc;      
            --texto-mutado: #8b949e;     
            --cor-destaque: #238636;      
            --cor-destaque-hover: #2ea043;
            --cor-perigo: #da3637;        
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-claro);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--bg-cards);
            border-bottom: 1px solid var(--borda-suave);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        header h1 span {
            color: var(--cor-destaque-hover);
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* Seção do Formulário */
        .painel-upload {
            background-color: var(--bg-cards);
            border: 1px solid var(--borda-suave);
            border-radius: 8px;
            padding: 1.5rem;
            height: fit-content;
        }

        .painel-upload h2 {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--borda-suave);
            padding-bottom: 0.5rem;
        }

        .campo-grupo {
            margin-bottom: 1.2rem;
        }

        .campo-grupo label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--texto-mutado);
            font-size: 0.9rem;
        }

        .campo-grupo input, .campo-grupo textarea, .campo-grupo select {
            width: 100%;
            background-color: var(--bg-inputs);
            border: 1px solid var(--borda-suave);
            border-radius: 6px;
            padding: 0.75rem;
            color: var(--texto-claro);
            outline: none;
            transition: border-color 0.2s;
        }

        .campo-grupo input:focus, .campo-grupo textarea:focus {
            border-color: var(--cor-destaque-hover);
        }

        .campo-arquivo-customizado {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-inputs);
            border: 2px dashed var(--borda-suave);
            border-radius: 6px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
        }

        .campo-arquivo-customizado input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .btn-salvar {
            width: 100%;
            background-color: var(--cor-destaque);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-salvar:hover {
            background-color: var(--cor-destaque-hover);
        }

        /* Seção da Listagem de Projetos */
        .painel-projetos {
            background-color: var(--bg-cards);
            border: 1px solid var(--borda-suave);
            border-radius: 8px;
            padding: 1.5rem;
        }

        .painel-projetos h2 {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--borda-suave);
            padding-bottom: 0.5rem;
        }

        .grid-projetos {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .card-projeto {
            background-color: var(--bg-principal);
            border: 1px solid var(--borda-suave);
            border-radius: 6px;
            padding: 1.2rem;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .card-topo {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .titulo-projeto {
            font-size: 1.1rem;
            color: var(--texto-claro);
            font-weight: 600;
        }

        .tag-tipo {
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 12px;
            background-color: var(--bg-inputs);
            border: 1px solid var(--borda-suave);
            color: var(--texto-mutado);
        }

        .descricao-projeto {
            font-size: 0.9rem;
            color: var(--texto-mutado);
            line-height: 1.4;
        }

        .metadados-projeto {
            font-size: 0.8rem;
            color: var(--texto-mutated);
            margin-top: 0.5rem;
            display: flex;
            gap: 1rem;
        }

        .link-arquivo {
            color: var(--cor-destaque-hover);
            text-decoration: none;
            font-size: 0.85rem;
            word-break: break-all;
        }

        .link-arquivo:hover {
            text-decoration: underline;
        }

        .btn-deletar {
            background-color: transparent;
            color: var(--cor-perigo);
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            align-self: flex-end;
            margin-top: 0.5rem;
        }

        .btn-deletar:hover {
            text-decoration: underline;
        }

        .sem-projetos {
            text-align: center;
            color: var(--texto-mutado);
            padding: 3rem 0;
            font-style: italic;
        }

        footer {
            margin-top: auto;
            text-align: center;
            padding: 1.5rem;
            border-top: 1px solid var(--borda-suave);
            color: var(--texto-mutado);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>camargo7<span>_</span></h1>
        <div style="color: var(--texto-mutado); font-size: 0.9rem;">File & Project Hub</div>
    </header>
    <div class="container">
        <aside class="painel-upload">
            <h2>Adicionar Novo Item</h2>
            <form id="formProjeto">
                <div class="campo-grupo">
                    <label for="nomeProjeto">Nome do Projeto / Arquivo</label>
                    <input type="text" id="nomeProjeto" required placeholder="Ex: Script de Automação Python">
                </div>
                <div class="campo-grupo">
                    <label for="tipoProjeto">Categoria</label>
                    <select id="tipoProjeto">
                        <option value="Código / Script">Código / Script</option>
                        <option value="Documento / PDF">Documento / PDF</option>
                        <option value="Design / Imagem">Design / Imagem</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>

                <div class="campo-grupo">
                    <label for="descricaoProjeto">Descrição breve</label>
                    <textarea id="descricaoProjeto" rows="3" placeholder="Descreva os detalhes do projeto ou arquivo..."></textarea>
                </div>

                <div class="campo-grupo">
                    <label>Upload do Arquivo</label>
                    <div class="campo-arquivo-customizado">
                        <span id="textoArquivo">Selecionar arquivo do sistema</span>
                        <input type="file" id="arquivoInput">
                    </div>
                </div>

                <button type="submit" class="btn-salvar">Salvar no Hub</button>
            </form>
        </aside>
        <main class="painel-projetos">
            <h2>Arquivos e Projetos Cadastrados</h2>
            <div id="listaProjetos" class="grid-projetos">
            </div>
        </main>
    </div>

    <footer>
        <p>&copy; 2026 camargo7. Todos os direitos reservados. Armazenamento local criptografado em Sandbox.</p>
    </footer>

    <script>

        const arquivoInput = document.getElementById('arquivoInput');
